<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration — Base de Loisirs Verruyes</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #003366;
            --secondary: #D92323;
            --bg: #f4f9f9;
            --surface: #ffffff;
            --text: #001f3f;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { display: flex; background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background-color: var(--primary); color: white; padding: 30px 20px; display: flex; flex-direction: column; gap: 15px; }
        .sidebar h2 { font-weight: 800; font-size: 1.5em; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .nav-btn { background: transparent; border: none; color: rgba(255,255,255,0.7); text-align: left; padding: 12px 15px; border-radius: 8px; cursor: pointer; font-size: 1em; font-weight: 600; transition: 0.3s; }
        .nav-btn:hover, .nav-btn.active { background: rgba(255,255,255,0.1); color: white; }
        
        /* Main Content */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .section { display: none; background: var(--surface); padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,51,102,0.05); }
        .section.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        h3 { color: var(--primary); margin-bottom: 25px; font-size: 1.8em; }
        
        /* Forms */
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 600; color: var(--primary); font-size: 0.95em; }
        input[type="text"], input[type="file"], input[type="date"], textarea { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1em; background: var(--bg); }
        input:focus, textarea:focus { outline: none; border-color: var(--secondary); }
        
        .btn-submit { background-color: var(--secondary); color: white; border: none; padding: 14px 24px; font-weight: 800; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-submit:hover { background-color: #b51c1c; transform: translateY(-2px); }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        
        .status { margin-top: 15px; font-weight: 600; color: #28a745; display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>🛠️ Admin Verruyes</h2>
        <button class="nav-btn active" onclick="showSection('sec-planning', this)">📅 Planning Semaine</button>
        <button class="nav-btn" onclick="showSection('sec-galerie', this)">📸 Galerie Accueil</button>
        <button class="nav-btn" onclick="showSection('sec-equipe', this)">👥 Équipe & Activités</button>
        <button class="nav-btn" onclick="showSection('sec-tournois', this)">🏆 Créer un Tournoi</button>
    </div>

    <div class="main-content">
        
        <div id="sec-planning" class="section active">
            <h3>Modifier l'image du Planning</h3>
            <form id="form-planning">
                <div class="form-group">
                    <label>Nouvelle image du planning (.jpg ou .png)</label>
                    <input type="file" id="file-planning" accept="image/*" required>
                </div>
                <button type="submit" class="btn-submit" id="btn-planning">Mettre à jour le planning</button>
                <div class="status" id="status-planning">✓ Planning mis à jour avec succès !</div>
            </form>
        </div>

        <div id="sec-galerie" class="section">
            <h3>Modifier la Galerie (Accueil)</h3>
            <form id="form-galerie">
                <div class="form-group">
                    <label>Image 1 (Plan d'eau)</label>
                    <input type="file" id="file-gal1" accept="image/*">
                </div>
                <div class="form-group">
                    <label>Image 2 (Activités)</label>
                    <input type="file" id="file-gal2" accept="image/*">
                </div>
                <div class="form-group">
                    <label>Image 3 (Plage)</label>
                    <input type="file" id="file-gal3" accept="image/*">
                </div>
                <button type="submit" class="btn-submit" id="btn-galerie">Mettre à jour la galerie</button>
                <div class="status" id="status-galerie">✓ Galerie mise à jour !</div>
            </form>
        </div>

        <div id="sec-equipe" class="section">
            <h3>Ajouter/Modifier un membre de l'équipe</h3>
            <form id="form-equipe">
                <div class="form-group">
                    <label>Prénom de l'animateur</label>
                    <input type="text" id="eq-nom" placeholder="Ex: Célian" required>
                </div>
                <div class="form-group">
                    <label>Rôle</label>
                    <input type="text" id="eq-role" placeholder="Ex: Animateur Référent" required>
                </div>
                <div class="form-group">
                    <label>Photo de profil</label>
                    <input type="file" id="file-equipe" accept="image/*" required>
                </div>
                <button type="submit" class="btn-submit" id="btn-equipe">Ajouter ce membre</button>
                <div class="status" id="status-equipe">✓ Membre ajouté avec succès !</div>
            </form>
        </div>

        <div id="sec-tournois" class="section">
            <h3>Créer un nouveau Tournoi</h3>
            <form id="form-tournois">
                <div class="form-group">
                    <label>Nom du Tournoi</label>
                    <input type="text" id="tr-nom" placeholder="Ex: Tournoi de Beach Volley" required>
                </div>
                <div class="form-group">
                    <label>Date de l'événement</label>
                    <input type="date" id="tr-date" required>
                </div>
                <div class="form-group">
                    <label>Description (Règles, lots, etc.)</label>
                    <textarea id="tr-desc" rows="4" placeholder="Détails du tournoi..." required></textarea>
                </div>
                <button type="submit" class="btn-submit" id="btn-tournois">Publier le Tournoi</button>
                <div class="status" id="status-tournois">✓ Tournoi publié avec succès !</div>
            </form>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfwA4JPtmOHm2VEIv02WftFgR1hz6t1GY",
            authDomain: "plandeau-47a57.firebaseapp.com",
            projectId: "plandeau-47a57",
            storageBucket: "plandeau-47a57.firebasestorage.app",
            messagingSenderId: "434894486889",
            appId: "1:434894486889:web:9c932440a68f1669ae51f8",
            measurementId: "G-0S6YM52V1T"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // Système d'onglets
        window.showSection = function(secId, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(secId).classList.add('active');
            btn.classList.add('active');
        };

        // Fonction générique d'upload d'image vers Firebase Storage
        async function uploadImage(file, path) {
            if (!file) return null;
            const storageRef = ref(storage, `${path}/${Date.now()}_${file.name}`);
            await uploadBytes(storageRef, file);
            return await getDownloadURL(storageRef);
        }

        // 1. UPDATE PLANNING
        document.getElementById('form-planning').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-planning');
            btn.disabled = true; btn.textContent = "Upload en cours...";
            
            try {
                const file = document.getElementById('file-planning').files[0];
                const url = await uploadImage(file, 'planning');
                // Enregistrer l'URL dans Firestore
                await setDoc(doc(db, "site_content", "planning"), { imageUrl: url, updatedAt: new Date() });
                
                document.getElementById('status-planning').style.display = 'block';
                setTimeout(() => { document.getElementById('status-planning').style.display = 'none'; }, 3000);
            } catch (error) { alert("Erreur d'upload : Vérifie les règles Firebase Storage."); console.error(error); }
            
            btn.disabled = false; btn.textContent = "Mettre à jour le planning";
            e.target.reset();
        });

        // 2. UPDATE GALERIE
        document.getElementById('form-galerie').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-galerie');
            btn.disabled = true; btn.textContent = "Upload en cours...";
            
            try {
                const urls = {};
                const f1 = document.getElementById('file-gal1').files[0];
                const f2 = document.getElementById('file-gal2').files[0];
                const f3 = document.getElementById('file-gal3').files[0];
                
                if(f1) urls.img1 = await uploadImage(f1, 'galerie');
                if(f2) urls.img2 = await uploadImage(f2, 'galerie');
                if(f3) urls.img3 = await uploadImage(f3, 'galerie');

                await setDoc(doc(db, "site_content", "galerie"), urls, { merge: true });
                
                document.getElementById('status-galerie').style.display = 'block';
                setTimeout(() => { document.getElementById('status-galerie').style.display = 'none'; }, 3000);
            } catch (error) { alert("Erreur : " + error.message); }
            
            btn.disabled = false; btn.textContent = "Mettre à jour la galerie";
            e.target.reset();
        });

        // 3. AJOUTER EQUIPE
        document.getElementById('form-equipe').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-equipe');
            btn.disabled = true; btn.textContent = "Création...";
            
            try {
                const file = document.getElementById('file-equipe').files[0];
                const url = await uploadImage(file, 'equipe');
                const nom = document.getElementById('eq-nom').value;
                const role = document.getElementById('eq-role').value;

                await addDoc(collection(db, "equipe"), { nom: nom, role: role, imageUrl: url });
                
                document.getElementById('status-equipe').style.display = 'block';
                setTimeout(() => { document.getElementById('status-equipe').style.display = 'none'; }, 3000);
            } catch (error) { alert("Erreur : " + error.message); }
            
            btn.disabled = false; btn.textContent = "Ajouter ce membre";
            e.target.reset();
        });

        // 4. CREER TOURNOI
        document.getElementById('form-tournois').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-tournois');
            btn.disabled = true; btn.textContent = "Publication...";
            
            try {
                const nom = document.getElementById('tr-nom').value;
                const date = document.getElementById('tr-date').value;
                const desc = document.getElementById('tr-desc').value;

                await addDoc(collection(db, "tournois"), { nom: nom, date: date, description: desc, statut: "Ouvert" });
                
                document.getElementById('status-tournois').style.display = 'block';
                setTimeout(() => { document.getElementById('status-tournois').style.display = 'none'; }, 3000);
            } catch (error) { alert("Erreur : " + error.message); }
            
            btn.disabled = false; btn.textContent = "Publier le Tournoi";
            e.target.reset();
        });
    </script>
</body>
</html>
